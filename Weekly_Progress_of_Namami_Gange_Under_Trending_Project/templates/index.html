<script>

function formatDate(dateStr){

    if(!dateStr) return "";

    return new Date(dateStr)
        .toLocaleDateString("en-GB");
}

function formatDateTime(dateStr){

    if(!dateStr) return "";

    return new Date(dateStr)
        .toLocaleString("en-GB");
}

function loadData(){

    fetch("/api/current")

    .then(res => res.json())

    .then(data => {

        let rows = "";

        data.forEach(row => {

            rows += `
            <tr>

                <td>${row.sr_no || ""}</td>

                <td>${row.district_name || ""}</td>

                <td>${row.city_name || ""}</td>

                <td>${row.project_name || ""}</td>

                <td>${row.scheme_type || ""}</td>

                <td>${row.project_mode || ""}</td>

                <td>${formatDate(row.sanction_date)}</td>

                <td>${row.sanction_cost || ""}</td>

                <td>${row.work_cost || ""}</td>

                <td>${row.centage || ""}</td>

                <td>${row.om_cost || ""}</td>

                <td>${row.stp_count || ""}</td>

                <td>${row.stp_capacity || ""}</td>

                <td>${row.drain_count || ""}</td>

                <td>${formatDate(row.update_date)}</td>

                <td>${row.remarks || ""}</td>

            </tr>`;
        });

        document.getElementById("tableBody").innerHTML = rows;

        if(data.length){

            document.getElementById("lastUpdate")
                .innerHTML =
                "Last Update Date : " +
                formatDateTime(data[0].scrape_time);
        }

    })
    .catch(console.error);
}

document
.getElementById("btnRefresh")
.addEventListener(
    "click",
    async function(){

        const btn = this;

        btn.disabled = true;

        btn.innerText =
        "Refreshing...";

        try{

            const response =
            await fetch(
                "/api/fetch-now",
                {
                    method:"POST"
                }
            );

            const result =
            await response.json();

            alert(
                result.message
            );

            setTimeout(
                loadData,
                3000
            );
        }
        catch(err){

            console.error(err);

            alert(
                "Refresh Failed"
            );
        }
        finally{

            btn.disabled = false;

            btn.innerText =
            "Fetch Updated Data";
        }
    }
);

loadData();

setInterval(loadData, 10000);

</script>
