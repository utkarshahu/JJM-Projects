<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Completed Projects</title>



<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#fff;
}

.header{
    padding:8px;
    text-align:center;
    background:#f5f5f5;
    border-bottom:2px solid #000;
}

.header h2{
    margin:0;
    font-size:18px;
    font-weight:bold;
}

.table-wrapper{
    height:94vh;
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    border:2px solid #000;
}

thead{
    position:sticky;
    top:0;
    z-index:999;
}

thead th{
    background:#f1f5b3;
}

th,
td{
    border:1px solid #000;
    padding:3px 5px;
    text-align:center;
    vertical-align:middle;
    font-size:11px;
    line-height:1.2;
}

th{
    font-size:11px;
    font-weight:700;
}

td{
    font-size:10px;
}

tr:nth-child(even){
    background:#fafafa;
}

tr:hover{
    background:#fff6cc;
}

/* Column widths */

td:nth-child(1),
th:nth-child(1){
    min-width:40px;
}

td:nth-child(2),
th:nth-child(2){
    min-width:100px;
}

td:nth-child(3),
th:nth-child(3){
    min-width:100px;
}

td:nth-child(4),
th:nth-child(4){
    min-width:350px;
    text-align:left;
}

td:nth-child(15),
th:nth-child(15){
    min-width:250px;
}

td:nth-child(17),
th:nth-child(17){
    min-width:200px;
}
.fetch_data{
    text-align:right;
    margin-bottom:10px;
}

.refresh-btn{

    background:#28a745;

    color:white;

    border:none;

    padding:8px 15px;

    border-radius:4px;

    cursor:pointer;

    font-size:12px;
}

.refresh-btn:hover{
    opacity:0.9;
}
.last-update{
    margin-top:8px;
    text-align:center;
    font-size:13px;
    font-weight:bold;
    color:#006400;
}
</style>

</head>
<body>

<div class="header">

    <h2>
        Weekly Progress Of Namami Gange
        Completed Projects
    </h2>
    <div id="lastUpdate" class="last-update">
    Last Update Date : Loading...
    </div>
    <div class="fetch_data">

    <button
        class="refresh-btn"
        onclick="fetchUpdatedData()">

        Fetch Updated Data

    </button>

</div>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

    <th rowspan="2">Sr.No</th>
    <th rowspan="2">District</th>
    <th rowspan="2">Town</th>

    <th rowspan="2">
        Name of Sewerage Project
    </th>

    <th rowspan="2">
        Scheme Type
    </th>

    <th rowspan="2">
        Mode
    </th>

    <th colspan="5">
        AA&ES and Date
    </th>

    <th rowspan="2">
        No. STP
    </th>

    <th rowspan="2">
        STP Capacity
    </th>

    <th rowspan="2">
        No. Drains
    </th>

    <th rowspan="2">
        Agency
    </th>

    <th rowspan="2">
        Agreement Cost
    </th>

    <th rowspan="2">
        Remarks
    </th>

</tr>

<tr>

    <th>Date</th>
    <th>Sanction</th>
    <th>Work</th>
    <th>Centage</th>
    <th>O&M</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>
    function formatDateTime(dateStr){

    if(!dateStr) return "";

    const d = new Date(dateStr);

    if(isNaN(d)) return dateStr;

    const day =
        String(d.getDate()).padStart(2,'0');

    const months = [
        "Jan","Feb","Mar","Apr",
        "May","Jun","Jul","Aug",
        "Sep","Oct","Nov","Dec"
    ];

    const month =
        months[d.getMonth()];

    const year =
        d.getFullYear();

    const hours =
        String(d.getHours()).padStart(2,'0');

    const minutes =
        String(d.getMinutes()).padStart(2,'0');

    const seconds =
        String(d.getSeconds()).padStart(2,'0');

    return `${day}-${month}-${year} ${hours}:${minutes}:${seconds}`;
}
function formatDate(dateStr){

    if(!dateStr) return "";

    const d = new Date(dateStr);

    if(isNaN(d)) return dateStr;

    return (
        String(d.getDate()).padStart(2,'0')
        + "/"
        + String(d.getMonth()+1).padStart(2,'0')
        + "/"
        + d.getFullYear()
    );
}

async function fetchUpdatedData(){

    const btn =
    document.querySelector(
        ".refresh-btn"
    );

    btn.disabled = true;

    btn.innerText =
    "Refreshing...";

    try{

        const response =
        await fetch(
            "/api/fetch-now",
            {
                method:"POST"
            }
        );

        const result =
        await response.json();

        alert(
            result.message
        );

        // Wait a little
        setTimeout(
            loadData,
            2000
        );

    }
    catch(err){

        console.error(err);

        alert(
            "Refresh Failed"
        );
    }
    finally{

        btn.disabled = false;

        btn.innerText =
        "Fetch Updated Data";
    }
}
function loadData() {

    fetch("/api/current")
    .then(r => r.json())
    .then(data => {

        let html = "";

        // Last Update
        if(data.length > 0){

            document.getElementById(
                "lastUpdate"
            ).innerHTML =
                "Last Update Date : " +
                formatDateTime(
                    data[0].scrape_time
                );
        }

        data.forEach(row => {

            html += `
            <tr>

                <td>${row.sr_no || ""}</td>

                <td>${row.district_name || ""}</td>

                <td>${row.city_name || ""}</td>

                <td>${row.project_name || ""}</td>

                <td>${row.scheme_type || ""}</td>

                <td>${row.project_mode || ""}</td>

                <td>${formatDate(row.sanction_date)}</td>

                <td>${row.sanction_cost || ""}</td>

                <td>${row.work_cost || ""}</td>

                <td>${row.centage || ""}</td>

                <td>${row.om_cost || ""}</td>

                <td>${row.stp_count || ""}</td>

                <td>${row.stp_capacity || ""}</td>

                <td>${row.drain_count || ""}</td>

                <td>${row.agency_name || ""}</td>

                <td>${row.agreement_cost || ""}</td>

                <td>${row.remarks || ""}</td>

            </tr>
            `;
        });

        document.getElementById(
            "tableBody"
        ).innerHTML = html;

    })
    .catch(err => {
        console.error(err);
    });
}

loadData();

setInterval(
    loadData,
    10000
);

</script>

</body>
</html>
